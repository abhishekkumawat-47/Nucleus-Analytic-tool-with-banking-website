<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Accounts')}"></head>
<body>
  <div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <div class="main-content">
      <header th:replace="~{fragments/layout :: topbar('Accounts')}"></header>
      <div class="page-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
          <div class="page-header" style="margin-bottom:0;">
            <h2 class="page-title">Your Accounts</h2>
            <p class="page-subtitle">Manage and monitor all your bank accounts.</p>
          </div>
          <button class="btn btn-primary" onclick="showCreateAccount()">New Account</button>
        </div>
        <div id="accountsGrid" class="grid-3"><div class="spinner"></div></div>
        <div class="card" style="margin-top:24px;">
          <div class="card-header"><span class="card-title">Transfer Between Accounts</span></div>
          <form id="transferForm" onsubmit="handleTransfer(event)">
            <div class="grid-3">
              <div class="form-group"><label class="form-label">From</label><select id="fromAcc" class="form-select"></select></div>
              <div class="form-group"><label class="form-label">To</label><select id="toAcc" class="form-select"></select></div>
              <div class="form-group"><label class="form-label">Amount (₹)</label><input type="number" id="transferAmt" class="form-input" min="1" placeholder="0.00" required></div>
            </div>
            <button type="submit" class="btn btn-primary">Transfer Funds</button>
          </form>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="createModal">
    <div class="modal">
      <div class="modal-header"><span class="modal-title">Open New Account</span><button class="modal-close" onclick="closeModal()">&times;</button></div>
      <form onsubmit="handleCreateAccount(event)">
        <div class="form-group"><label class="form-label">Account Type</label><select id="newAccType" class="form-select"><option>SAVINGS</option><option>CURRENT</option><option>INVESTMENT</option></select></div>
        <div class="form-group"><label class="form-label">Initial Deposit (₹)</label><input type="number" id="initBalance" class="form-input" value="0" min="0"></div>
        <button type="submit" class="btn btn-primary btn-block">Open Account</button>
      </form>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script>
    let userAccounts = [];
    async function initPage() {
      await initializeApp();
      if (!currentUser) { window.location.href = '/login'; return; }
      await loadAccounts();
    }
    async function loadAccounts() {
      const accs = await api.get('/customers/accounts/' + currentUser.id);
      userAccounts = accs;
      const grid = document.getElementById('accountsGrid');
      if (accs.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="title">No accounts yet</div><div class="desc">Open your first account to begin.</div></div>';
        return;
      }
      grid.innerHTML = accs.map(a => `<div class="account-card"><div class="accent-bar"></div><div class="type">${a.accountType}</div><div class="balance">${formatCurrency(a.balance)}</div><div class="acc-no">${a.accNo}</div><div class="ifsc">IFSC: ${a.ifsc}</div></div>`).join('');
      const fromSel = document.getElementById('fromAcc');
      const toSel = document.getElementById('toAcc');
      fromSel.innerHTML = accs.map(a => `<option value="${a.accNo}">${a.accountType} — ${a.accNo} (${formatCurrency(a.balance)})</option>`).join('');
      toSel.innerHTML = accs.map(a => `<option value="${a.accNo}">${a.accountType} — ${a.accNo}</option>`).join('');
    }
    function showCreateAccount() { document.getElementById('createModal').classList.add('show'); }
    function closeModal() { document.getElementById('createModal').classList.remove('show'); }
    async function handleCreateAccount(e) {
      e.preventDefault();
      try {
        const res = await api.get('/tenants/ifsc-list');
        const ifsc = res[0]?.ifsc || 'NEXA0001';
        await api.post('/accounts', { customerId: currentUser.id, ifsc, accountType: document.getElementById('newAccType').value, balance: Number(document.getElementById('initBalance').value) });
        showToast('Account opened successfully.', 'success'); closeModal(); await loadAccounts();
      } catch (err) { showToast(err.message, 'error'); }
    }
    async function handleTransfer(e) {
      e.preventDefault();
      try {
        await api.post('/accounts/transfer', { fromAccountNo: document.getElementById('fromAcc').value, toAccountNo: document.getElementById('toAcc').value, amount: Number(document.getElementById('transferAmt').value) });
        showToast('Transfer completed.', 'success'); await loadAccounts();
      } catch (err) { showToast(err.message, 'error'); }
    }
    async function logout() { await api.post('/auth/logout'); window.location.href = '/'; }
  </script>
</body>
</html>
