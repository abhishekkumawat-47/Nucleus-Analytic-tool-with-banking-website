<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body>
  <div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <div class="main-content">
      <header th:replace="~{fragments/layout :: topbar('Dashboard')}"></header>
      <div class="page-content">
        <div class="grid-4" id="statsGrid" style="margin-bottom:24px;">
          <div class="stat-card"><div class="stat-label">Total Balance</div><div class="stat-value" id="totalBalance">—</div></div>
          <div class="stat-card"><div class="stat-label">Active Accounts</div><div class="stat-value" id="activeAccounts">—</div></div>
          <div class="stat-card"><div class="stat-label">Transactions</div><div class="stat-value" id="txCount">—</div></div>
          <div class="stat-card"><div class="stat-label">Pro Licenses</div><div class="stat-value" id="proCount">—</div></div>
        </div>
        <div class="grid-2">
          <div class="card">
            <div class="card-header"><span class="card-title">Accounts</span><a href="/accounts" class="btn btn-outline btn-sm">View all</a></div>
            <div id="accountsList"><div class="spinner"></div></div>
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">Recent Activity</span><a href="/transactions" class="btn btn-outline btn-sm">View all</a></div>
            <div id="txList"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script>
    async function initPage() {
      await initializeApp();
      if (!currentUser) { window.location.href = '/login'; return; }
      try {
        const accounts = await api.get('/customers/accounts/' + currentUser.id);
        document.getElementById('totalBalance').textContent = formatCurrency(accounts.reduce((s,a) => s + a.balance, 0));
        document.getElementById('activeAccounts').textContent = accounts.length;
        const list = document.getElementById('accountsList');
        if (accounts.length === 0) {
          list.innerHTML = '<div class="empty-state"><div class="title">No accounts</div><div class="desc">Create an account to get started.</div></div>';
        } else {
          list.innerHTML = accounts.slice(0,4).map(a => `<div class="row-item"><div><div class="label" style="font-weight:600;color:var(--text-primary);">${a.accountType} Account</div><div style="font-size:12px;color:var(--text-muted);">${a.accNo}</div></div><div class="value">${formatCurrency(a.balance)}</div></div>`).join('');
        }
      } catch(e) { document.getElementById('accountsList').innerHTML = '<div class="empty-state"><div class="title">Could not load accounts</div></div>'; }
      try {
        const txs = await api.get('/byCustomer/' + currentUser.id);
        document.getElementById('txCount').textContent = txs.length;
        const txList = document.getElementById('txList');
        if (txs.length === 0) {
          txList.innerHTML = '<div class="empty-state"><div class="title">No transactions yet</div></div>';
        } else {
          txList.innerHTML = txs.slice(0,5).map(t => `<div class="row-item"><div><div class="label" style="font-weight:500;color:var(--text-primary);">${t.category || t.transactionType}</div><div style="font-size:11px;color:var(--text-muted);">${formatDateTime(t.timestamp)}</div></div><div class="value">${formatCurrency(t.amount)}</div></div>`).join('');
        }
      } catch(e) { document.getElementById('txList').innerHTML = '<div class="empty-state"><div class="title">Could not load transactions</div></div>'; }
      try {
        const pro = await api.get('/pro/status');
        document.getElementById('proCount').textContent = pro.length || '0';
      } catch(e) { document.getElementById('proCount').textContent = '0'; }
    }
    async function logout() { await api.post('/auth/logout'); window.location.href = '/'; }
  </script>
</body>
</html>
