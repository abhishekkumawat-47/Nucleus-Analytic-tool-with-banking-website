<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Beneficiaries')}"></head>
<body>
  <div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <div class="main-content">
      <header th:replace="~{fragments/layout :: topbar('Beneficiaries')}"></header>
      <div class="page-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
          <div class="page-header" style="margin-bottom:0;">
            <h2 class="page-title">Beneficiaries</h2>
            <p class="page-subtitle">Manage saved payees for quick payments.</p>
          </div>
          <button class="btn btn-primary" onclick="document.getElementById('addModal').classList.add('show')">Add Beneficiary</button>
        </div>
        <div class="card"><div id="payeesList"><div class="spinner"></div></div></div>
        <div class="card" style="margin-top:24px;">
          <div class="card-header"><span class="card-title">Send Payment</span></div>
          <form onsubmit="handlePay(event)">
            <div class="grid-3">
              <div class="form-group"><label class="form-label">From Account</label><select id="payFrom" class="form-select"></select></div>
              <div class="form-group"><label class="form-label">Beneficiary Account</label><input type="text" id="payTo" class="form-input" placeholder="Account number"></div>
              <div class="form-group"><label class="form-label">Amount (₹)</label><input type="number" id="payAmt" class="form-input" min="1" placeholder="0.00" required></div>
            </div>
            <button type="submit" class="btn btn-primary">Send Payment</button>
          </form>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <div class="modal-header"><span class="modal-title">Add Beneficiary</span><button class="modal-close" onclick="document.getElementById('addModal').classList.remove('show')">&times;</button></div>
      <form onsubmit="handleAddPayee(event)">
        <div class="form-group"><label class="form-label">Account Number</label><input type="text" id="pAccNo" class="form-input" required></div>
        <div class="form-group"><label class="form-label">IFSC Code</label><input type="text" id="pIfsc" class="form-input" required></div>
        <div class="form-group"><label class="form-label">Beneficiary Name</label><input type="text" id="pName" class="form-input" required></div>
        <button type="submit" class="btn btn-primary btn-block">Add Beneficiary</button>
      </form>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script>
    async function initPage() {
      await initializeApp();
      if (!currentUser) { window.location.href = '/login'; return; }
      await loadPayees();
      const accs = await api.get('/customers/accounts/' + currentUser.id);
      document.getElementById('payFrom').innerHTML = accs.map(a => `<option value="${a.accNo}">${a.accNo} (${formatCurrency(a.balance)})</option>`).join('');
    }
    async function loadPayees() {
      const payees = await api.get('/payees/' + currentUser.id);
      const el = document.getElementById('payeesList');
      if (payees.length === 0) { el.innerHTML = '<div class="empty-state"><div class="title">No beneficiaries</div><div class="desc">Add a beneficiary to send payments quickly.</div></div>'; return; }
      el.innerHTML = `<table><thead><tr><th>Name</th><th>Account No.</th><th>IFSC</th><th>Actions</th></tr></thead><tbody>${payees.map(p => `<tr><td style="font-weight:600;">${p.name}</td><td>${p.payeeAccNo}</td><td>${p.payeeifsc}</td><td><button class="btn btn-ghost btn-sm" style="color:var(--danger);" onclick="delPayee('${p.payeeAccNo}')">Remove</button></td></tr>`).join('')}</tbody></table>`;
    }
    async function handleAddPayee(e) {
      e.preventDefault();
      try {
        await api.post('/payee/' + currentUser.id, { name: document.getElementById('pName').value, payeeAccNo: document.getElementById('pAccNo').value, payeeifsc: document.getElementById('pIfsc').value, payeeType: 'INDIVIDUAL' });
        showToast('Beneficiary added.', 'success'); document.getElementById('addModal').classList.remove('show'); await loadPayees();
      } catch (err) { showToast(err.message, 'error'); }
    }
    async function delPayee(accNo) {
      if (!confirm('Remove this beneficiary?')) return;
      try { await api.del('/payee/' + currentUser.id, { payeeAccNo: accNo }); showToast('Removed.', 'success'); await loadPayees(); } catch (e) { showToast(e.message, 'error'); }
    }
    async function handlePay(e) {
      e.preventDefault();
      try {
        await api.post('/accounts/pay', { fromAccountNo: document.getElementById('payFrom').value, toAccountNo: document.getElementById('payTo').value, amount: Number(document.getElementById('payAmt').value) });
        showToast('Payment sent.', 'success');
      } catch (e) { showToast(e.message, 'error'); }
    }
    async function logout() { await api.post('/auth/logout'); window.location.href = '/'; }
  </script>
</body>
</html>
