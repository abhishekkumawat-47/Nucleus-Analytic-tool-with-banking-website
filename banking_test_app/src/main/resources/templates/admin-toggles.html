<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Feature Toggles')}"></head>
<body>
  <div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <div class="main-content">
      <header th:replace="~{fragments/layout :: topbar('Feature Toggles')}"></header>
      <div class="page-content">
        <div class="page-header"><h2 class="page-title">Feature Toggles</h2><p class="page-subtitle">Enable or disable platform capabilities for all tenants.</p></div>
        <div class="card"><div id="togglesList"><div class="spinner"></div></div></div>
      </div>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script>
    async function initPage() {
      await initializeApp();
      if (!currentUser || currentUser.role !== 'ADMIN') { window.location.href = '/dashboard'; return; }
      await loadToggles();
    }
    async function loadToggles() {
      const toggles = await api.get('/events/toggles/bank_a');
      const el = document.getElementById('togglesList');
      el.innerHTML = Object.entries(toggles).map(([key, enabled]) => `
        <div class="row-item">
          <div><div class="label" style="font-weight:600;color:var(--text-primary);">${key.replace(/_/g, ' ')}</div><div style="font-size:11px;color:var(--text-muted);">${key}</div></div>
          <button class="btn ${enabled?'btn-success':'btn-secondary'} btn-sm" onclick="toggleFeature('${key}', ${!enabled})">${enabled?'Enabled':'Disabled'}</button>
        </div>`).join('');
    }
    async function toggleFeature(key, enabled) {
      await api.put('/events/toggles/' + key, { enabled, tenantId: 'bank_a' });
      showToast(key + ' ' + (enabled?'enabled':'disabled') + '.', 'info');
      await loadToggles();
    }
    async function logout() { await api.post('/auth/logout'); window.location.href = '/'; }
  </script>
</body>
</html>
