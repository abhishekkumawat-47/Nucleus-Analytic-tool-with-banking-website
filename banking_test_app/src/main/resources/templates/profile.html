<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Settings')}"></head>
<body>
  <div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <div class="main-content">
      <header th:replace="~{fragments/layout :: topbar('Settings')}"></header>
      <div class="page-content">
        <div class="page-header"><h2 class="page-title">Account Settings</h2><p class="page-subtitle">Manage your personal information and security.</p></div>
        <div class="grid-2">
          <div class="card">
            <div class="card-header"><span class="card-title">Personal Information</span></div>
            <div id="profileInfo"><div class="spinner"></div></div>
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">Change Password</span></div>
            <form onsubmit="handlePassword(event)">
              <div class="form-group"><label class="form-label">Current Password</label><input type="password" id="oldPw" class="form-input" required></div>
              <div class="form-group"><label class="form-label">New Password</label><input type="password" id="newPw" class="form-input" required minlength="6"></div>
              <button type="submit" class="btn btn-primary">Update Password</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script>
    async function initPage() {
      await initializeApp();
      if (!currentUser) { window.location.href = '/login'; return; }
      try {
        const p = await api.get('/auth/profile');
        document.getElementById('profileInfo').innerHTML = `
          <div class="row-item"><div class="label">Name</div><div class="value">${p.name}</div></div>
          <div class="row-item"><div class="label">Email</div><div class="value">${p.email}</div></div>
          <div class="row-item"><div class="label">Phone</div><div class="value">${p.phone}</div></div>
          <div class="row-item"><div class="label">PAN</div><div class="value">${p.pan}</div></div>
          <div class="row-item"><div class="label">Role</div><div class="value"><span class="badge badge-info">${p.role}</span></div></div>
          <div class="row-item"><div class="label">Date of Birth</div><div class="value">${formatDate(p.dateOfBirth)}</div></div>`;
      } catch(e) { document.getElementById('profileInfo').innerHTML = '<p style="color:var(--text-muted);font-size:13px;">Error loading profile.</p>'; }
    }
    async function handlePassword(e) {
      e.preventDefault();
      try {
        await api.put('/auth/updatePassword', { id: currentUser.id, oldPassword: document.getElementById('oldPw').value, newPassword: document.getElementById('newPw').value });
        showToast('Password updated.', 'success');
      } catch(e) { showToast(e.message, 'error'); }
    }
    async function logout() { await api.post('/auth/logout'); window.location.href = '/'; }
  </script>
</body>
</html>
