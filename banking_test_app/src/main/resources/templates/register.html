<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Create Account')}"></head>
<body>
  <div class="auth-page">
    <div class="auth-left">
      <div class="auth-form" style="max-width:420px;">
        <div class="logo">
          <div class="logo-icon">N</div>
          <span class="logo-text">NexaBank</span>
        </div>
        <h1>Create your account</h1>
        <p class="subtitle">Start banking with NexaBank in a few steps.</p>
        <form id="registerForm" onsubmit="handleRegister(event)">
          <div class="grid-2">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input type="text" id="name" class="form-input" placeholder="John Doe" required>
            </div>
            <div class="form-group">
              <label class="form-label">PAN Number</label>
              <input type="text" id="pan" class="form-input" placeholder="ABCDE1234F" required maxlength="10" style="text-transform:uppercase;">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Email address</label>
            <input type="email" id="email" class="form-input" placeholder="name@company.com" required>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label class="form-label">Phone number</label>
              <input type="tel" id="phone" class="form-input" placeholder="9876543210" required>
            </div>
            <div class="form-group">
              <label class="form-label">Date of birth</label>
              <input type="date" id="dob" class="form-input" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Minimum 6 characters" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="regBtn" style="margin-top:8px;">Create Account</button>
          <div style="display:flex;align-items:center;gap:12px;margin:20px 0;">
            <div style="flex:1;height:1px;background:var(--border);"></div>
            <span style="font-size:12px;color:var(--text-muted);">or</span>
            <div style="flex:1;height:1px;background:var(--border);"></div>
          </div>
          <a href="/oauth2/authorization/google" class="btn btn-secondary btn-block btn-lg" style="gap:10px;">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Sign up with Google
          </a>
          <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--text-muted);">
            Already have an account? <a href="/login">Sign in</a>
          </p>
        </form>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-right-content">
        <h2>Join thousands who bank smarter.</h2>
        <p>No paperwork, no queues. Get a fully digital banking experience with NexaBank — instant account setup and seamless transfers.</p>
      </div>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script>
    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('regBtn');
      btn.disabled = true; btn.textContent = 'Creating...';
      try {
        await api.post('/auth/register', {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          phone: document.getElementById('phone').value,
          password: document.getElementById('password').value,
          dateOfBirth: document.getElementById('dob').value,
          pan: document.getElementById('pan').value.toUpperCase(),
          tenantId: 'bank_a'
        });
        window.location.href = '/dashboard';
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
