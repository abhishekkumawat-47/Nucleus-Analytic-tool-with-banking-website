<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Loan Management')}"></head>
<body>
  <div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <div class="main-content">
      <header th:replace="~{fragments/layout :: topbar('Loan Review')}"></header>
      <div class="page-content">
        <div class="page-header"><h2 class="page-title">Loan Management</h2><p class="page-subtitle">Review and process pending loan applications.</p></div>
        <div class="card">
          <div class="table-container" id="loanApps"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script>
    async function initPage() {
      await initializeApp();
      if (!currentUser || currentUser.role !== 'ADMIN') { window.location.href = '/dashboard'; return; }
      await loadApps();
    }
    async function loadApps() {
      const apps = await api.get('/admin/applications');
      const el = document.getElementById('loanApps');
      if (apps.length === 0) { el.innerHTML = '<div class="empty-state"><div class="title">No applications</div></div>'; return; }
      el.innerHTML = `<table><thead><tr><th>Customer</th><th>Type</th><th>Amount</th><th>Term</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody>${apps.map(a => `<tr><td style="font-size:11px;color:var(--text-muted);">${a.customerId.substring(0,8)}...</td><td>${a.loanType}</td><td style="font-weight:600;">${formatCurrency(a.principalAmount)}</td><td>${a.term} mo</td><td><span class="badge ${a.status==='APPROVED'?'badge-success':a.status==='REJECTED'?'badge-danger':'badge-warning'}">${a.status}</span></td><td>${formatDate(a.createdOn)}</td><td>${a.status==='PENDING'?`<button class="btn btn-success btn-sm" onclick="approveLoan('${a.id}','${a.customerId}')">Approve</button> <button class="btn btn-ghost btn-sm" style="color:var(--danger);" onclick="rejectLoan('${a.id}')">Reject</button>` : '<span style="color:var(--text-muted);font-size:12px;">—</span>'}</td></tr>`).join('')}</tbody></table>`;
    }
    async function approveLoan(id, custId) {
      try {
        const accs = await api.get('/customers/accounts/' + custId);
        if (accs.length === 0) { showToast('No account found for disbursal.', 'error'); return; }
        await api.post('/approve/' + id, { accNo: accs[0].accNo });
        showToast('Loan approved.', 'success'); await loadApps();
      } catch(e) { showToast(e.message, 'error'); }
    }
    async function rejectLoan(id) {
      try { await api.post('/reject/' + id); showToast('Loan rejected.', 'info'); await loadApps(); } catch(e) { showToast(e.message, 'error'); }
    }
    async function logout() { await api.post('/auth/logout'); window.location.href = '/'; }
  </script>
</body>
</html>
