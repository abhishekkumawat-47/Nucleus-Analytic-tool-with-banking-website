<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NexaBank - Digital Banking Platform">
  <title th:text="${title} + ' — NexaBank'">NexaBank</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<!-- Sidebar Fragment -->
<nav th:fragment="sidebar" class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">N</div>
    <span class="sidebar-title">NexaBank</span>
  </div>
  <div class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-title">Overview</div>
      <a href="/dashboard" class="nav-link"><span>Dashboard</span></a>
      <a href="/accounts" class="nav-link"><span>Accounts</span></a>
      <a href="/transactions" class="nav-link"><span>Transactions</span></a>
      <a href="/payees" class="nav-link"><span>Beneficiaries</span></a>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">Services</div>
      <a href="/loans" class="nav-link"><span>Loans</span></a>
      <a href="/pro-feature" class="nav-link"><span>Pro Services</span><span class="badge">PRO</span></a>
    </div>
    <div class="nav-section" id="adminNav">
      <div class="nav-section-title">Administration</div>
      <a href="/admin/simulate" class="nav-link"><span>Simulation</span></a>
      <a href="/admin/feature-toggles" class="nav-link"><span>Feature Toggles</span></a>
      <a href="/admin/loans" class="nav-link"><span>Loan Review</span></a>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">Account</div>
      <a href="/profile" class="nav-link"><span>Settings</span></a>
      <a href="#" class="nav-link" onclick="logout()"><span>Sign Out</span></a>
    </div>
  </div>
</nav>

<!-- Topbar Fragment -->
<header th:fragment="topbar(pageTitle)" class="topbar">
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="btn-ghost btn-sm" onclick="toggleSidebar()" style="display:none;" id="menuBtn">Menu</button>
    <h1 class="topbar-title" th:text="${pageTitle}">Page</h1>
  </div>
  <div class="topbar-actions">
    <a href="/profile" class="user-pill">
      <div class="user-avatar" id="userAvatar">U</div>
      <span id="userName">Account</span>
    </a>
  </div>
</header>

</body>
</html>
