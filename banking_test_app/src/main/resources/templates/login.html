<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Sign In')}"></head>
<body>
  <div class="auth-page">
    <div class="auth-left">
      <div class="auth-form">
        <div class="logo">
          <div class="logo-icon">N</div>
          <span class="logo-text">NexaBank</span>
        </div>
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to your account to continue.</p>
        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label">Email address</label>
            <input type="email" id="email" class="form-input" placeholder="name@company.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn" style="margin-top:8px;">Sign In</button>
          <div style="display:flex;align-items:center;gap:12px;margin:20px 0;">
            <div style="flex:1;height:1px;background:var(--border);"></div>
            <span style="font-size:12px;color:var(--text-muted);">or</span>
            <div style="flex:1;height:1px;background:var(--border);"></div>
          </div>
          <a href="/oauth2/authorization/google" class="btn btn-secondary btn-block btn-lg" style="gap:10px;">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Continue with Google
          </a>
          <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--text-muted);">
            Don't have an account? <a href="/register">Create one</a>
          </p>
        </form>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-right-content">
        <h2>Banking built for the modern era.</h2>
        <p>Open an account in minutes. Transfer money, manage loans, and track your spending — all in one place.</p>
      </div>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Signing in...';
      try {
        await api.post('/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        });
        window.location.href = '/dashboard';
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
