<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Transactions')}"></head>
<body>
  <div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar}"></nav>
    <div class="main-content">
      <header th:replace="~{fragments/layout :: topbar('Transactions')}"></header>
      <div class="page-content">
        <div class="page-header">
          <h2 class="page-title">Transaction History</h2>
          <p class="page-subtitle" id="txSummary">Loading transactions...</p>
        </div>
        <div class="card">
          <div class="table-container" id="txContainer"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script>
    async function initPage() {
      await initializeApp();
      if (!currentUser) { window.location.href = '/login'; return; }
      try {
        const txs = await api.get('/byCustomer/' + currentUser.id);
        document.getElementById('txSummary').textContent = txs.length + ' transactions found';
        const c = document.getElementById('txContainer');
        if (txs.length === 0) {
          c.innerHTML = '<div class="empty-state"><div class="title">No transactions yet</div><div class="desc">Your transaction history will appear here.</div></div>';
          return;
        }
        c.innerHTML = `<table><thead><tr><th>Date</th><th>Type</th><th>Category</th><th>From</th><th>To</th><th>Amount</th><th>Status</th></tr></thead><tbody>${txs.map(t => `<tr><td>${formatDateTime(t.timestamp)}</td><td><span class="badge badge-info">${t.transactionType}</span></td><td>${t.category || '—'}</td><td style="font-size:12px;color:var(--text-muted);">${t.senderAccNo}</td><td style="font-size:12px;color:var(--text-muted);">${t.receiverAccNo}</td><td style="font-weight:600;">${formatCurrency(t.amount)}</td><td><span class="badge ${t.status==='SUCCESS'?'badge-success':'badge-danger'}">${t.status}</span></td></tr>`).join('')}</tbody></table>`;
      } catch (e) { document.getElementById('txContainer').innerHTML = '<div class="empty-state"><div class="title">Error loading transactions</div></div>'; }
    }
    async function logout() { await api.post('/auth/logout'); window.location.href = '/'; }
  </script>
</body>
</html>
