version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  broker:
    image: confluentinc/cp-server:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_CONFLUENT_LICENSE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_BALANCER_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  # Create topics on startup
  init-kafka:
    image: confluentinc/cp-server:7.4.0
    depends_on:
      - broker
    command: "bash -c 'echo Waiting for Kafka to be ready... && cub kafka-ready -b broker:29092 1 40 && kafka-topics --create --topic feature-events --partitions 1 --replication-factor 1 --if-not-exists --bootstrap-server broker:29092'"

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./storage/schema.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      CLICKHOUSE_DB: feature_intelligence
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse

  ingestion-api:
    build: .
    depends_on:
      - broker
      - clickhouse
    ports:
      - "8000:8000"
    environment:
      - DEPLOYMENT_MODE=CLOUD
      - KAFKA_BROKER_URL=broker:29092
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=clickhouse
    command: uvicorn ingestion.main:app --host 0.0.0.0 --port 8000 --reload

  processor-worker:
    build: .
    depends_on:
      - broker
      - clickhouse
    environment:
      - KAFKA_BROKER_URL=broker:29092
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=clickhouse
    command: python processing/worker.py

  analytics-api:
    build: .
    depends_on:
      - clickhouse
    ports:
      - "8001:8001"
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=clickhouse
    command: uvicorn api.main:app --host 0.0.0.0 --port 8001 --reload
