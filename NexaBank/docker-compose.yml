version: "3.8"

services:
  # ─── Backend (Express + Prisma + ts-node) ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexabank-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - PORT=5000
      - FRONTEND_URL=http://localhost:3002
    volumes:
      # Hot-reload: mount source code (but NOT node_modules)
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    restart: unless-stopped

  # ─── Frontend (Next.js + Turbopack dev) ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexabank-frontend
    ports:
      - "3002:3002"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    volumes:
      # Hot-reload: mount source directories
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/hooks:/app/hooks
      - ./frontend/lib:/app/lib
      - ./frontend/src:/app/src
      - ./frontend/types:/app/types
      - ./frontend/public:/app/public
    depends_on:
      - backend
    restart: unless-stopped
